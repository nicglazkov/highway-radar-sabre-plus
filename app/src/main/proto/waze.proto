// ---------------------------------------------------------------------------
// ClientInfo (most failure-prone for register/login handshakes)
// ---------------------------------------------------------------------------

message ClientInfo {
  // Nested per generated source: WazeProtocol.ClientInfo.ClientApi
  message ClientApi {
    optional ClientApiType type = 1;
    optional string package_name = 2;
  }

  enum Environment {
    STAGING = 1;
    AUTOPUSH = 2;
    PRODUCTION = 3;
  }

  optional int32 protocol = 1;
  optional string device = 2;
  optional string client_version = 3;
  optional Coordinate last_position = 4;
  optional string manufacturer = 5;
  optional string model = 6;
  optional string name = 7;
  optional int32 width = 8;
  optional int32 height = 9;
  optional string application_type = 10;
  optional string os_version = 11;
  optional int32 applicatin_mode_bitmap = 12;
  optional StringMap client_ab_tests = 13;
  optional bool return_text = 14;
  optional bool simulated = 15;
  optional string locale = 16;
  optional string installation_id = 17;
  optional DeviceType device_type = 18;
  optional AppType app_type = 19;
  repeated ClientApi client_api = 20;
  optional Environment environment = 21;
  optional StringMap debug_options = 22;
  optional string user_agent = 23;
  repeated Display display = 24;
  optional string os_language_id = 25;
  optional string session_uuid = 26;
  optional bool is_jailbroken = 27;
  optional int64 current_time_millis = 28;
  optional string device_brand = 29;
  optional bool is_24_hour_format = 30;
  optional AppFlavor app_flavor = 31;
}

message Display {
  enum Type {
    UNKNOWN = 1;
    BUILT_IN = 2;
    CARPLAY = 3;
    ANDROID_AUTO = 4;
    SMART_DEVICE_LINK = 5;
    WEB_LINK = 6;
    PIONEER = 7;
    WEB = 8;
  }
  optional Type type = 1;
  optional int32 width = 2;
  optional int32 height = 3;
}

message ReportAdsSettings {
  optional string advertising_id = 1;
  optional bool opted_out_of_tracking = 2;
}

// ---------------------------------------------------------------------------
// Registration
// ---------------------------------------------------------------------------

// NOTE: Register carries only `code`; the username/password live in
// RegisterSuccessful (the server response).
message Register {
  optional string code = 1;
}

message RegisterSuccessful {
  optional string username = 1;
  optional string password = 2;
  optional string token = 3;
  optional int64 user_id = 4;
}

// ---------------------------------------------------------------------------
// Login
// ---------------------------------------------------------------------------

message PasswordCredential {
  optional string username = 1;
  optional string password = 2;
}

message TokenCredential {
  optional string token = 1;
}

message LoginRequest {
  enum LoginReason {
    NORMAL = 0;
    SIGN_IN = 1;
  }
  enum ExcludedLoginResponse {
    FORMAT_UNSPECIFIED = 0;
    USER_PROFILE = 1;
    LOGIN_ENCOURAGEMENT = 2;
    GET_MEETINGS = 3;
    CONSENT = 4;
    POINTS = 6;
  }
  oneof credential {
    PasswordCredential password_credential = 1;
    TokenCredential token_credential = 2;
  }
  optional LoginReason reason = 3;
  optional bool logout_other_devices = 4 [default = true];
  repeated ExcludedLoginResponse excluded_login_responses = 5;
}

message LoginSuccess {
  optional int64 server_session_id = 1;
  optional string global_user_id = 2;
  optional string secret_key = 3;
  optional string session_id = 4;
}

message LoginError {
  enum AuthErrorType {
    UNKNOWN_ERROR = 0;
    WRONG_USER_PASSWORD = 1;
    INTERNAL_ISSUES = 2;
    NOT_AUTHORIZED = 3;
    REFRESH_TOKEN = 4;
    ANOTHER_DEVICE_LOGGED_IN = 5;
    INVALID_TOKEN = 6;
    UNAUTHENTICATED_TOKEN = 7;
    TOKEN_QUOTA_EXCEEDED = 8;
    APP_VERSION_NOT_SUPPORTED = 9;
  }
  optional int64 reason = 1;
  optional AuthErrorType error_type = 2;
  // Omitted: another_device_logged_in_details=3, app_version_not_supported_details=4,
  // internal_issues_details=5 (detail sub-messages, not needed for fetch path).
}

message LoginResponse {
  oneof response {
    LoginSuccess login_success = 1;
    LoginError login_error = 2;
  }
}

// ---------------------------------------------------------------------------
// Auth header helpers referenced by Element
// ---------------------------------------------------------------------------

message UID {
  optional int64 id = 1;
  optional string secret_key = 2;
  optional int32 protocol = 3;
}

// ---------------------------------------------------------------------------
// Alert FETCH payloads
// ---------------------------------------------------------------------------

message AddAlertAction {
  optional RealtimeAlert realtime_alert = 1;
}

message RealtimeAlert {
  optional int64 id = 1;
  optional AlertInfo alert_info = 2;
  optional AlertReportingInfo alert_reporting_info = 3;
  // Field 4 is not present in this protocol version.
  optional bool notify_alerter_shown = 5;
  optional string alert_uuid = 6;
  optional string alerter_shown_token = 7;
}

message AlertInfo {
  optional AlertType type = 1;
  optional AlertSubType sub_type = 2;
  optional Coordinate position = 3;
  // Omitted: segment_direction_id = 4 (SegmentNodes sub-message).
  optional SegmentDirection seg_direction = 5;
  optional int32 azymuth = 6;
  optional bool on_route = 7;
  optional int32 priority = 8;
  // Omitted: alert_details = 9 (large AlertDetails sub-tree).
}

message AlertReportingInfo {
  optional int64 primary_alert_id = 1;
  optional int32 kind = 2;
  optional string description = 3;
  optional int64 report_time = 4;
  optional string reporter_username = 5;
  optional bool current_user_is_reporter = 6;
  optional string report_image_id = 7;
  optional AlertAddress alert_address = 8;
  optional int32 thumbs_up_count = 9;
  optional bool current_user_thumbed_up = 10;
  optional int32 seconds_to_report = 11;
  optional bool should_ping_user = 12;
  optional bool archive = 13;
  // Omitted: beep_info=14, comment_info=15, chat_info=16, alert_source_info=17
  // (sub-messages, not needed for the fetch path).
}

message AlertAddress {
  optional string location_near_by_report = 1;
  optional string street = 2;
  optional string city = 3;
}

// ---------------------------------------------------------------------------
// Server bookkeeping members referenced by Element (minimal stubs).
// Field numbers preserved; bodies kept empty so they parse as opaque and are
// skipped, since the fetch path never reads them.
// ---------------------------------------------------------------------------

message ServerError {
  optional int32 code = 10101;
  optional string description = 10102;
  optional string request_id = 10103;
  optional string command_name = 10105;
  optional string service_name = 10106;
  optional string exception_type = 10107;
  optional string exception_detail = 10108;
}

// Referenced by Element (fields 2150, 2225, 2384). Bodies intentionally left
// empty: the fetch path does not read their contents, and an empty proto2
// message parses any wire bytes as unknown fields, preserving compatibility.
message ResponseTimestamp {}
message LoginSuccessful {}
message AT {}
