  CHIT_CHAT = 1;
  POLICE = 2;
  ACCIDENT = 3;
  JAM = 4;
  TRAFFIC_INFO = 5;
  HAZARD = 6;
  MISC = 7;
  CONSTRUCTION = 8;
  PARKING = 9;
  DYNAMIC = 10;
  CAMERA = 11;
  __NOT_IN_USE__PARKED = 12;
  ROAD_CLOSED = 13;
  SYSTEM_ROAD_CLOSED = 14;
  UNKNOWN_ALERT = 15;
  SOS = 16;
  CRASH_PRONE = 17;
  TURN_CLOSED = 19;
  NEW_BAD_WEATHER = 100;
  NEW_LANE_CLOSED = 101;
  PERMANENT_HAZARD = 103;
  PERSONAL_SAFETY = 104;
}

enum AlertSubType {
