  JAM_HEAVY_TRAFFIC = 402;
  JAM_STAND_STILL_TRAFFIC = 403;
  JAM_LIGHT_TRAFFIC = 404;
  HAZARD_ON_ROAD = 601;
  HAZARD_ON_SHOULDER = 602;
  HAZARD_WEATHER = 603;
  HAZARD_ON_ROAD_OBJECT = 604;
  HAZARD_ON_ROAD_POT_HOLE = 605;
  HAZARD_ON_ROAD_ROAD_KILL = 606;
