// Minimal, wire-compatible reconstruction of the Waze mobile RT protocol.
//
// Reconstructed by reading decompiled wzsabre 2.2 (jadx WazeProtocol.java +
// smali). Field NUMBERS and wire TYPES are taken directly from each message's
// generated writeTo()/getSerializedSize() (the authoritative wire spec for this
// protobuf-lite build) and from the *_FIELD_NUMBER int constants.
//
// Scope: ONLY the messages needed for the area-alert FETCH path
// (ClientInfo / register / login + incoming RealtimeAlert parsing). Reporting
// messages, alert "details" sub-trees, and other unrelated Element members are
// intentionally omitted. Because every field is proto2 optional/repeated, the
// omitted fields are simply skipped on the wire and do not affect compatibility.
//
// All integer scalars use plain int32/int64 (the writers emit writeInt32 /
// writeInt64 -- NOT writeSInt32/writeUInt32 -- so there is no zig-zag encoding,
// e.g. Coordinate.lat/lon and AlertInfo.azymuth are int32, confirmed in smali).

syntax = "proto2";

option java_package = "app.sabre.wzsabre.waze";
option java_outer_classname = "WazeProto";
option optimize_for = LITE_RUNTIME;

// ---------------------------------------------------------------------------
// Top-level container
// ---------------------------------------------------------------------------

message Batch {
  repeated Element element = 1001;
  optional int64 expiration_gmt = 1002;
}

// The big polymorphic container. Each Element carries exactly one logical
// payload (selected by the caller); proto2 makes them all independent optional
// fields rather than a oneof. Only the FETCH-path members are reconstructed
// here; many other high-numbered members exist in the full schema.
message Element {
  optional int32 request_id = 1;
  optional string old_command = 2001;
  optional ServerError error = 2003;
  optional ReportAdsSettings report_ads_setting = 2108;
  optional ResponseTimestamp response_timestamp = 2150;
  optional ClientInfo client_info = 2184;
  optional Register register = 2219;
  optional RegisterSuccessful register_successful = 2220;
  optional UID uid = 2221;
  optional LoginError login_error = 2224;
  optional LoginSuccessful login_successful = 2225;
  optional AT at = 2384;
  optional AddAlertAction add_alert_action = 2708;
  optional LoginRequest login_request = 2744;
  optional LoginResponse login_response = 2745;
}

// ---------------------------------------------------------------------------
// Shared scalar/helper messages
// ---------------------------------------------------------------------------

message StringEntry {
  optional string key = 1;
  optional string value = 2;
}

message StringMap {
  repeated StringEntry entry = 1;
}

message Coordinate {
  optional int32 lon_times1000000 = 101;
  optional int32 lat_times1000000 = 102;
}

// ---------------------------------------------------------------------------
// Top-level enums
// ---------------------------------------------------------------------------

enum DeviceType {
  UNKNOWN_DEVICE_TYPE = 0;
  SYMBIAN_NO_TOUCH_SCREEN_DEVICE = 10;
  SYMBIAN_TOUCH_SCREEN_DEVICE = 11;
  IPHONE_DEVICE = 21;
  CE_NO_TOUCH_SCREEN_DEVICE = 30;
  CE_TOUCH_SCREEN_DEVICE = 31;
  ANDROID_DEVICE = 50;
  WP8_DEVICE = 80;
  LINUX_DEVICE = 90;
  WEB = 100;
}

enum AppType {
  UNKNOWN_APP_TYPE = 0;
  WAZE = 1;
  RIDER = 2;
  BROADCAST = 3;
  WAZE_BUILT_IN_DISPLAY = 4;
  WAZE_BUILT_IN_DISPLAY_PHONE = 5;
  WAZE_BUILT_IN_DISPLAY_CARPLAY = 6;
  WEB_CLIENT = 7;
  CARPOOL_ALERTS_ORCHESTRATOR = 8;
  WAZE_ANDROID_AUTOMOTIVE_OS = 9;
}

enum AppFlavor {
  UNKNOWN_APP_FLAVOR = 0;
  RELEASE = 1;
  FISHFOOD = 2;
  DOGFOOD = 3;
  PRE_BETA = 4;
  ALPHA = 5;
  DEV = 6;
  ONEOFF = 7;
  BETA = 8;
}

enum ClientApiType {
  UNKNOWN_CLIENT_API = 0;
  TRANSPORT = 1;
  AUDIO = 2;
}

enum SegmentDirection {
  SEGMENT_DIRECTION_UNSPECIFIED = 0;
  SEGMENT_DIRECTION_FORWARD = 1;
  SEGMENT_DIRECTION_BACKWARD = 2;
  SEGMENT_DIRECTION_BOTH = 3;
}

