name: Release

# Cutting a release is now one command: push a version tag (e.g. `git tag v1.6 &&
# git push origin v1.6`) and this builds a signed APK and publishes the GitHub
# release with it attached.
#
# Requires these repository secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64    - base64 of the signing keystore (base64 -w0 app/caltrans-sabre.keystore)
#   KEYSTORE_PASSWORD  - store password
#   KEY_ALIAS          - key alias
#   KEY_PASSWORD       - key password

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Skip cleanly (with a warning) when signing secrets aren't configured, so a
  # manual/tag release doesn't produce a failed workflow run.
  guard:
    runs-on: ubuntu-latest
    outputs:
      signable: ${{ steps.check.outputs.signable }}
    steps:
      - id: check
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] \
             && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "signable=true" >> "$GITHUB_OUTPUT"
          else
            echo "signable=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Signing secrets missing/incomplete — skipping automated release. Release manually or add all four secrets (see BUILDING.md)."
          fi

  release:
    needs: guard
    if: needs.guard.outputs.signable == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          {
            echo "storeFile=release.keystore"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Stage APK asset
        run: cp app/build/outputs/apk/release/app-release.apk "SABRE-Plus-${GITHUB_REF_NAME}.apk"

      - name: Prepare release notes from CHANGELOG
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Extract the CHANGELOG section for this version (the curated notes).
          # Prefix-match on the literal header to avoid regex-bracket pitfalls.
          awk -v hdr="## [$VER]" '
            index($0, hdr) == 1 { flag=1; next }
            flag && index($0, "## [") == 1 { exit }
            flag { print }
          ' CHANGELOG.md > BODY.md
          if [ ! -s BODY.md ]; then
            echo "See [CHANGELOG.md](https://github.com/nicglazkov/highway-radar-sabre-plus/blob/main/CHANGELOG.md)." > BODY.md
          fi
          # Every release leads with a friendly, unmissable note for wzsabre users.
          printf '%s\n' \
            "> **👋 Coming from the original wzsabre? Uninstall it first.**" \
            ">" \
            "> SABRE Plus replaces wzsabre and shares the plugin ID that Highway Radar looks for, so Android only allows one of them at a time. Uninstall the old **wzsabre** app (long-press its icon, then App info, then Uninstall), then install SABRE Plus below. Your Highway Radar setup stays exactly as it is. Never had wzsabre? Just install, you are all set. 🙂" \
            "" > RELEASE_NOTES.md
          cat BODY.md >> RELEASE_NOTES.md
          echo "--- release notes ---"; cat RELEASE_NOTES.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK="SABRE-Plus-${GITHUB_REF_NAME}.apk"
          # Idempotent: if a release for this tag already exists (re-run or re-pushed
          # tag), attach/replace the APK and refresh the notes instead of failing.
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "$APK" --clobber
            gh release edit "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md
          else
            gh release create "${GITHUB_REF_NAME}" "$APK" \
              --title "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md
          fi

      - name: Clean up secrets
        if: always()
        run: rm -f app/release.keystore keystore.properties
